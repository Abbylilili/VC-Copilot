<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柱状图示例</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;

    }
    body {
        padding: 100px;  /* 只给 body 加边距 */
    }
    .box{
        width: 700px;
        height: 500px;
        border-left: 1px solid black;
        border-bottom: 1px solid black;
        display: flex;
        justify-content: space-around;
        align-items: flex-end;
        text-align: center;
        margin: 50px auto;  /* 水平居中，并增加顶部和底部的间距 */
    }
    .box div{
        width: 50px;
        background-color: blue;
        color: black;
        display: flex;
        flex-direction: column;
        justify-content: space-between;

    }
    .box div h4{
        margin-bottom: -40px;
    }
    .box div span{
       margin-top: -20px;
    }
  
</style>
<body>
    <script>
        let height = []
        for(let i = 1; i<=4; i++){
            height.push(prompt('请输入柱状图的高度'));
        }
        document.write('<div class="box">');
        for(i=0; i<height.length; i++){
            document.write(`
                <div style="height: ${height[i]}px;">
                    <span>${height[i]}</span>
                    <h4>${i+1}季度</h4>
                </div>
            `);
     }
      
        document.write('</div>');
    </script>
    
</body>
</html>
